<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact me for system administration and server management opportunities.">
    <title>IT Portfolio | Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/index.css">
    <script src="js/components.js" defer></script>
    <style>
      .contact-container {
        max-width: 600px;
        margin: 4rem auto;
        min-height: 50vh;
      }
      .form-group {
        margin-bottom: 1.5rem;
      }
      .form-label {
        display: block;
        font-weight: 600;
        margin-bottom: 0.5rem;
      }
      .form-control {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-family: inherit;
        font-size: 1rem;
      }
      .form-control:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(211,47,47,0.1);
      }
      .text-muted { color: var(--text-muted); }
    </style>
</head>
<body>
    <site-header></site-header>
    
    <main class="container">
        <div class="contact-container fade-in">
            <div class="card">
                <h2 class="text-center" style="color: var(--primary);">Get In Touch</h2>
                <p class="text-center mb-2 text-muted">Interested in working together or have a question? Leave a message.</p>
                
                <form onsubmit="event.preventDefault(); alert('Message Sent!');">
                    <div class="form-group">
                        <label class="form-label" for="name">Name</label>
                        <input type="text" id="name" class="form-control" required placeholder="John Doe">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="email">Email</label>
                        <input type="email" id="email" class="form-control" required placeholder="john@example.com">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="message">Message</label>
                        <textarea id="message" class="form-control" rows="5" required placeholder="How can I help you?"></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
                </form>
            </div>
        </div>
    </main>

    <site-footer></site-footer>
</body>
</html>
